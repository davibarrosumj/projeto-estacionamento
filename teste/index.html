<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de Estacionamento</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f2f4f7;
    display: flex;
    height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 260px;
    background: #dcdde1;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar ul {
    list-style: none;
}

.sidebar li {
    padding: 12px;
    margin-bottom: 10px;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.sidebar li:hover {
    background: #cfd3da;
}

/* ===== CONTEÚDO PRINCIPAL ===== */
.main {
    flex: 1;
    display: flex;
    gap: 20px;
    padding: 20px;
}

/* ===== ESTACIONAMENTO ===== */
.parking {
    width: 300px;
    background: #e0e0e0;
    border-radius: 10px;
    padding: 20px;
}

.parking h3 {
    text-align: center;
    margin-bottom: 15px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.vaga {
    height: 60px;
    background: #2ecc71;
    border-radius: 6px;
}

.vaga.ocupada {
    background: #e74c3c;
}

/* ===== PORCENTAGEM ===== */
.status {
    width: 200px;
    background: #1e272e;
    color: #fff;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
}

.status h3 {
    margin-bottom: 10px;
}

.percent {
    font-size: 32px;
    margin: 20px 0;
}

.status button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.entrada {
    background: #2ecc71;
}

.saida {
    background: #e74c3c;
    color: #fff;
}

/* ===== TICKETS ===== */
.tickets {
    flex: 1;
    background: #111;
    color: #fff;
    border-radius: 10px;
    padding: 20px;
}

.ticket {
    background: #222;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Usuário</h2>
    <ul>
    <li onclick="window.location.href='dados.html'">
    Dados Cadastrais
    </li>       
    <li>Alterar Senha</li>
        <li>Informações do Sistema</li>
        <li>Suporte</li>
    </ul>
</div>

<!-- CONTEÚDO -->
<div class="main">

    <!-- ESTACIONAMENTO -->
    <div class="parking">
        <h3>Estacionamento</h3>
        <div class="grid" id="vagas"></div>
    </div>

    <!-- STATUS -->
    <div class="status">
        <h3>Ocupação</h3>
        <div class="percent" id="percentual">0%</div>
        <button class="entrada" onclick="entrada()">Entrou Carro</button>
        <button class="saida" onclick="saida()">Saiu Carro</button>
    </div>

    <!-- TICKETS -->
    <div class="tickets">
        <h3>Tickets Ativos</h3>
        <div class="ticket">Ticket #001 - Vaga 3</div>
        <div class="ticket">Ticket #002 - Vaga 5</div>
    </div>

</div>

<script>
const totalVagas = 9;
let ocupadas = 0;

const vagasContainer = document.getElementById("vagas");
const percentual = document.getElementById("percentual");

function renderVagas() {
    vagasContainer.innerHTML = "";
    for (let i = 0; i < totalVagas; i++) {
        const vaga = document.createElement("div");
        vaga.classList.add("vaga");
        if (i < ocupadas) vaga.classList.add("ocupada");
        vagasContainer.appendChild(vaga);
    }
    atualizarPercentual();
}

function atualizarPercentual() {
    const percent = Math.round((ocupadas / totalVagas) * 100);
    percentual.innerText = percent + "%";
}

function entrada() {
    if (ocupadas < totalVagas) {
        ocupadas++;
        renderVagas();
    }
}

function saida() {
    if (ocupadas > 0) {
        ocupadas--;
        renderVagas();
    }
}

renderVagas();
</script>

</body>
</html>
