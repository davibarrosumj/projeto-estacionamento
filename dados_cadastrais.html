```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Clientes</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

h1{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
font-size:14px;
text-align:left;
}

th{
background:#2f3640;
color:white;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.editar{
background:#3498db;
color:white;
}

.salvar{
background:#27ae60;
color:white;
}

tr.editando{
background:#fff8e1;
}

input{
width:100%;
border:none;
background:transparent;
outline:none;
}

input:disabled{
color:black;
}

</style>

</head>

<body>

<h1>Clientes Cadastrados</h1>

<table>

<thead>
<tr>
<th>ID</th>
<th>Nome Completo</th>
<th>CPF</th>
<th>Banco</th>
<th>Data Nascimento</th>
<th>Telefone</th>
<th>Endereço</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="clientesTabela"></tbody>

</table>

<script>

const clientes = [
{
id:1,
nome:"Carlos Silva",
cpf:"123.456.789-10",
banco:"Banco do Brasil",
nascimento:"12/04/1995",
telefone:"99999-1111",
endereco:"Rua das Flores, 120"
},
{
id:2,
nome:"Maria Souza",
cpf:"987.654.321-00",
banco:"Caixa Econômica",
nascimento:"03/09/1998",
telefone:"99999-2222",
endereco:"Av Central, 340"
}
]

function carregarClientes(){

let tabela = document.getElementById("clientesTabela")
tabela.innerHTML = ""

clientes.forEach(cliente => {

tabela.innerHTML += `
<tr id="linha-${cliente.id}">

<td>${cliente.id}</td>

<td><input id="nome-${cliente.id}" value="${cliente.nome}" disabled></td>
<td><input id="cpf-${cliente.id}" value="${cliente.cpf}" disabled></td>
<td><input id="banco-${cliente.id}" value="${cliente.banco}" disabled></td>
<td><input id="nascimento-${cliente.id}" value="${cliente.nascimento}" disabled></td>
<td><input id="telefone-${cliente.id}" value="${cliente.telefone}" disabled></td>
<td><input id="endereco-${cliente.id}" value="${cliente.endereco}" disabled></td>

<td>
<button class="editar" id="btn-${cliente.id}" onclick="toggleEditar(${cliente.id})">
Editar
</button>
</td>

</tr>
`
})

}

function toggleEditar(id){

let btn = document.getElementById(`btn-${id}`)
let linha = document.getElementById(`linha-${id}`)
let editando = btn.innerText === "Salvar"

let campos = ["nome","cpf","banco","nascimento","telefone","endereco"]

if(editando){

// SALVAR
let cliente = clientes.find(c => c.id === id)

campos.forEach(campo => {
let input = document.getElementById(`${campo}-${id}`)
cliente[campo] = input.value
input.disabled = true
})

btn.innerText = "Editar"
btn.classList.remove("salvar")
btn.classList.add("editar")

linha.classList.remove("editando")

}else{

// EDITAR
campos.forEach(campo => {
document.getElementById(`${campo}-${id}`).disabled = false
})

btn.innerText = "Salvar"
btn.classList.remove("editar")
btn.classList.add("salvar")

linha.classList.add("editando")

}

}

carregarClientes()

</script>

</body>
</html>
